<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据结构在线自测</title>
  <link rel="stylesheet" href="exam.css">
</head>
<body>
  <header class="exam-header">
    <nav>
      <a href="./">课程首页</a>
      <a href="viewer.html?src=../test/exams/README.md">考试说明</a>
      <a href="viewer.html?src=../ASSESSMENT_SECURITY.md">考核边界</a>
    </nav>
    <h1>数据结构在线自测考试</h1>
    <p>本页面是公开静态站点中的自测工具，提交后可查看分数、错题和解析。题目与答案位于前端文件中，不作为正式课程成绩依据。</p>
  </header>
  <main>
    <section class="exam-notice">
      <strong>自测定位</strong>
      <span>适合复习诊断和即时反馈；正式考试、hidden tests 与成绩评定请使用教师私有仓库或学校教学平台。</span>
    </section>
    <section class="exam-toolbar">
      <label>试卷
        <select id="examSelect">
          <option value="midterm">期中模拟卷 A</option>
          <option value="final">期末模拟卷 A</option>
        </select>
      </label>
      <button id="submitExam" type="button">提交并评分</button>
      <button id="resetExam" type="button">重做</button>
    </section>
    <section id="examMeta" class="exam-meta"></section>
    <form id="examForm" class="exam-form"></form>
    <section id="examResult" class="exam-result" aria-live="polite"></section>
  </main>
  <script src="exam.js"></script>
</body>
</html>
