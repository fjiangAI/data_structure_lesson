  <title>Week 09 堆与优先队列</title>
  <link rel="stylesheet" href="../assets/course-visualizer.css">
</head>
<body>
  <header class="week-hero">
    <nav class="week-nav">
      <a href="../onlineweb/">课程首页</a>
      <a href="lecture.md">讲义</a>
      <a href="examples/min_heap.c">C 代码</a>
      <a href="exercises.md">练习</a>
    </nav>
    <div class="week-hero-grid">
      <div>
        <p class="eyebrow">Week 09 交互演示</p>
        <h1>堆与优先队列</h1>
        <p class="theme">理解完全二叉树的数组表示，掌握上滤、下滤、建堆、堆排序和优先队列接口。</p>
        <div class="topics"><span>完全二叉树</span><span>数组存储</span><span>最小堆</span><span>最大堆</span><span>上滤</span><span>下滤</span><span>优先队列</span></div>
      </div>
      <aside class="principle-panel">
        <strong>本演示要验证的结构不变量</strong>
        <p>堆是完全二叉树，数组下标 i 的父结点是 (i-1)/2；每个父结点不大于孩子。</p>
      </aside>
    </div>
  </header>
  <main class="learning-shell">
    <section class="demo-stage">
      <div class="stage-header">
        <div>
          <p class="eyebrow">Scenario</p>
          <h2>在最小堆中插入 3，观察上滤如何维护堆序性质。</h2>
        </div>
        <div class="stage-actions">
          <button id="prevStep" class="icon-btn" aria-label="上一步" title="上一步">←</button>
          <button id="playSteps" class="primary-btn">自动播放</button>
          <button id="nextStep" class="icon-btn" aria-label="下一步" title="下一步">→</button>
          <button id="resetSteps" class="ghost-btn">重置</button>
        </div>
      </div>
      <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="stage-grid">
        <div id="visualCanvas" class="visual-canvas"></div>
        <aside class="step-panel">
          <p id="stepCounter" class="step-counter"></p>
          <h3 id="stepTitle"></h3>
          <p id="stepText"></p>
          <div id="stepMeta" class="step-meta"></div>
        </aside>
      </div>
    </section>

    <section class="operation-section">
      <div>
        <p class="eyebrow">Operations</p>
        <h2>关键操作不是口号，而是状态变化</h2>
      </div>
      <div class="ops">
          <button class="op-card" data-name="push" data-action="插入尾部后上滤" data-cost="O(log n)">
            <strong>push</strong>
            <small>O(log n)</small>
          </button>
          <button class="op-card" data-name="pop" data-action="根与尾交换后下滤" data-cost="O(log n)">
            <strong>pop</strong>
            <small>O(log n)</small>
          </button>
          <button class="op-card" data-name="peek" data-action="读取根元素" data-cost="O(1)">
            <strong>peek</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="buildHeap" data-action="从最后一个非叶结点开始下滤" data-cost="O(n)">
            <strong>buildHeap</strong>
            <small>O(n)</small>
          </button>
          <button class="op-card" data-name="heapSort" data-action="反复取堆顶" data-cost="O(n log n)">
            <strong>heapSort</strong>
            <small>O(n log n)</small>
          </button>
      </div>
      <div id="operationExplain" class="operation-explain">点击一个操作，观察它对应的组织方式和复杂度。</div>
    </section>

    <section class="resource-strip">
      <a href="lecture.md">课程讲义</a>
      <a href="examples/min_heap.c">C 示例代码</a>
      <a href="exercises.md">练习题</a>
      <a href="answers.md">参考答案</a>
      <a href="extensions.md">拓展问题</a>
    </section>
  </main>
