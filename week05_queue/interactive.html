<!doctype html>

  <meta charset="utf-8">

  <title>Week 05 受限线性表之二：队列</title>
  <link rel="stylesheet" href="../assets/course-visualizer.css">
</head>
<body>
  <header class="week-hero">
    <nav class="week-nav">
      <a href="../onlineweb/">课程首页</a>
      <a href="lecture.md">讲义</a>
      <a href="examples/circular_queue.c">C 代码</a>
      <a href="exercises.md">练习</a>
    </nav>
    <div class="week-hero-grid">
      <div>
        <p class="eyebrow">Week 05 交互演示</p>
        <h1>受限线性表之二：队列</h1>
        <p class="theme">掌握先进先出结构，理解循环队列、队满判定、层序遍历和任务调度。</p>
        <div class="topics"><span>FIFO</span><span>队头</span><span>队尾</span><span>循环队列</span><span>牺牲一个单元</span><span>广度优先思想</span></div>
      </div>
      <aside class="principle-panel">
        <strong>本演示要验证的结构不变量</strong>
        <p>front 指向队头元素；rear 指向下一个可写位置；牺牲一个单元区分队空和队满。</p>
      </aside>
    </div>
  </header>
  <main class="learning-shell">
    <section class="demo-stage">
      <div class="stage-header">
        <div>
          <p class="eyebrow">Scenario</p>
          <h2>循环队列容量为 6，观察 rear 和 front 如何取模移动。</h2>
        </div>
        <div class="stage-actions">
          <button id="prevStep" class="icon-btn" aria-label="上一步" title="上一步">←</button>
          <button id="playSteps" class="primary-btn">自动播放</button>
          <button id="nextStep" class="icon-btn" aria-label="下一步" title="下一步">→</button>
          <button id="resetSteps" class="ghost-btn">重置</button>
        </div>
      </div>
      <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="stage-grid">
        <div id="visualCanvas" class="visual-canvas"></div>
        <aside class="step-panel">
          <p id="stepCounter" class="step-counter"></p>
          <h3 id="stepTitle"></h3>
          <p id="stepText"></p>
          <div id="stepMeta" class="step-meta"></div>
        </aside>
      </div>
    </section>

    <section class="operation-section">
      <div>
        <p class="eyebrow">Operations</p>
        <h2>关键操作不是口号，而是状态变化</h2>
      </div>
      <div class="ops">
          <button class="op-card" data-name="enqueue" data-action="从 rear 位置加入元素" data-cost="O(1)">
            <strong>enqueue</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="dequeue" data-action="从 front 位置取出元素" data-cost="O(1)">
            <strong>dequeue</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="front" data-action="读取队头元素" data-cost="O(1)">
            <strong>front</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="isFull" data-action="(rear + 1) % capacity == front" data-cost="O(1)">
            <strong>isFull</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="层序处理" data-action="当前对象出队，其相邻对象入队" data-cost="O(n)">
            <strong>层序处理</strong>
            <small>O(n)</small>
          </button>
      </div>
      <div id="operationExplain" class="operation-explain">点击一个操作，观察它对应的组织方式和复杂度。</div>
    </section>

    <section class="resource-strip">
      <a href="lecture.md">课程讲义</a>
      <a href="examples/circular_queue.c">C 示例代码</a>
      <a href="exercises.md">练习题</a>
      <a href="answers.md">参考答案</a>
      <a href="extensions.md">拓展问题</a>
    </section>
  </main>
