<body>
  <header class="week-hero">
    <nav class="week-nav">
      <a href="../onlineweb/">课程首页</a>
      <a href="lecture.md">讲义</a>
      <a href="examples/linked_list.c">C 代码</a>

    <div class="week-hero-grid">
      <div>
        <p class="eyebrow">Week 03 交互演示</p>
        <h1>线性表之二：链表</h1>
        <p class="theme">理解指针连接形成的线性结构，掌握单链表、带头结点、插入删除、逆置和链表调试方法。</p>
        <div class="topics"><span>结点</span><span>指针域</span><span>头结点</span><span>前驱结点</span><span>动态分配</span><span>链表逆置</span></div>
      </div>
      <aside class="principle-panel">
        <strong>本演示要验证的结构不变量</strong>
        <p>每个结点只知道自己的 next；插入和删除的关键是先找到前驱结点。</p>
      </aside>
    </div>
  </header>
  <main class="learning-shell">
    <section class="demo-stage">
      <div class="stage-header">
        <div>
          <p class="eyebrow">Scenario</p>
          <h2>在带头结点单链表中，把 20 插入到 10 和 30 之间。</h2>
        </div>
        <div class="stage-actions">
          <button id="prevStep" class="icon-btn" aria-label="上一步" title="上一步">←</button>
          <button id="playSteps" class="primary-btn">自动播放</button>
          <button id="nextStep" class="icon-btn" aria-label="下一步" title="下一步">→</button>
          <button id="resetSteps" class="ghost-btn">重置</button>
        </div>
      </div>
      <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="stage-grid">
        <div id="visualCanvas" class="visual-canvas"></div>
        <aside class="step-panel">
          <p id="stepCounter" class="step-counter"></p>
          <h3 id="stepTitle"></h3>
          <p id="stepText"></p>
          <div id="stepMeta" class="step-meta"></div>
        </aside>
      </div>
    </section>

    <section class="operation-section">
      <div>
        <p class="eyebrow">Operations</p>
        <h2>关键操作不是口号，而是状态变化</h2>
      </div>
      <div class="ops">
          <button class="op-card" data-name="头插" data-action="新结点指向原首元结点，头结点指向新结点" data-cost="O(1)">
            <strong>头插</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="尾插" data-action="若维护尾指针可直接追加" data-cost="O(1) 或 O(n)">
            <strong>尾插</strong>
            <small>O(1) 或 O(n)</small>
          </button>
          <button class="op-card" data-name="按位查找" data-action="从头逐步走到第 i 个结点" data-cost="O(n)">
            <strong>按位查找</strong>
            <small>O(n)</small>
          </button>
          <button class="op-card" data-name="已知前驱插入" data-action="修改两条 next 指针" data-cost="O(1)">
            <strong>已知前驱插入</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="逆置" data-action="逐结点改变 next 方向" data-cost="O(n)">
            <strong>逆置</strong>
            <small>O(n)</small>
          </button>
      </div>
      <div id="operationExplain" class="operation-explain">点击一个操作，观察它对应的组织方式和复杂度。</div>
    </section>

    <section class="resource-strip">
      <a href="lecture.md">课程讲义</a>
      <a href="examples/linked_list.c">C 示例代码</a>
      <a href="exercises.md">练习题</a>
      <a href="answers.md">参考答案</a>
      <a href="extensions.md">拓展问题</a>
    </section>
  </main>
