<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Week 11 图算法基础</title>
  <link rel="stylesheet" href="../assets/course-visualizer.css">
</head>
<body>
  <header class="week-hero">
    <nav class="week-nav">
      <a href="../onlineweb/">课程首页</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/lecture.md">讲义</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/examples/graph_algorithms.c">C 代码</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/exercises.md">练习</a>
    </nav>
    <div class="week-hero-grid">
      <div>
        <p class="eyebrow">Week 11 交互演示</p>
        <h1>图算法基础</h1>
        <p class="theme">在图表示基础上学习拓扑排序、最短路径和最小生成树，理解算法与图模型的对应关系。</p>
        <div class="topics"><span>拓扑排序</span><span>Dijkstra</span><span>Prim</span><span>Kruskal 思想</span><span>松弛操作</span><span>贪心选择</span></div>
      </div>
      <aside class="principle-panel">
        <strong>本演示要验证的结构不变量</strong>
        <p>每轮选择 dist 最小的未确定顶点；一旦确定，该顶点最短距离不再改变。</p>
      </aside>
    </div>
  </header>
  <main class="learning-shell">
    <section class="demo-stage">
      <div class="stage-header">
        <div>
          <p class="eyebrow">Scenario</p>
          <h2>Dijkstra 从 A 出发，观察 dist 数组如何通过松弛变小。</h2>
        </div>
        <div class="stage-actions">
          <button id="prevStep" class="icon-btn" aria-label="上一步" title="上一步">←</button>
          <button id="playSteps" class="primary-btn">自动播放</button>
          <button id="nextStep" class="icon-btn" aria-label="下一步" title="下一步">→</button>
          <button id="resetSteps" class="ghost-btn">重置</button>
        </div>
      </div>
      <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="stage-grid">
        <div id="visualCanvas" class="visual-canvas"></div>
        <aside class="step-panel">
          <p id="stepCounter" class="step-counter"></p>
          <h3 id="stepTitle"></h3>
          <p id="stepText"></p>
          <div id="stepMeta" class="step-meta"></div>
        </aside>
      </div>
    </section>

    <section class="operation-section">
      <div>
        <p class="eyebrow">Operations</p>
        <h2>关键操作不是口号，而是状态变化</h2>
      </div>
      <div class="ops">
          <button class="op-card" data-name="拓扑排序" data-action="反复删除入度为 0 的顶点" data-cost="O(V+E)">
            <strong>拓扑排序</strong>
            <small>O(V+E)</small>
          </button>
          <button class="op-card" data-name="Dijkstra" data-action="每轮确定一个最近未确定顶点" data-cost="O(V^2) 或 O(E log V)">
            <strong>Dijkstra</strong>
            <small>O(V^2) 或 O(E log V)</small>
          </button>
          <button class="op-card" data-name="松弛" data-action="尝试用 u 改进 v 的距离" data-cost="O(1)">
            <strong>松弛</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="Prim" data-action="每轮选择连接生成树的最小边" data-cost="O(V^2) 或 O(E log V)">
            <strong>Prim</strong>
            <small>O(V^2) 或 O(E log V)</small>
          </button>
          <button class="op-card" data-name="路径恢复" data-action="pre 数组记录前驱" data-cost="O(path length)">
            <strong>路径恢复</strong>
            <small>O(path length)</small>
          </button>
      </div>
      <div id="operationExplain" class="operation-explain">点击一个操作，观察它对应的组织方式和复杂度。</div>
    </section>

    <section class="resource-strip">
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/lecture.md">课程讲义</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/examples/graph_algorithms.c">C 示例代码</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/exercises.md">练习题</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/answers.md">参考答案</a>
      <a href="../onlineweb/viewer.html?src=../week11_graph_algorithms/extensions.md">拓展问题</a>
    </section>
  </main>
  <script>
    window.COURSE_DEMO = {
  "id": 11,
  "title": "图算法基础",
  "shortTitle": "图算法",
  "theme": "在图表示基础上学习拓扑排序、最短路径和最小生成树，理解算法与图模型的对应关系。",
  "operations": [

      "activeNodes": [

        "D": "∞",

      },
      "activeEdges": [],
      "text": "源点 A 的距离为 0，其余未知为无穷大。"
    },
    {
      "title": "确定 A 并松弛",

      "activeNodes": [
        "E",

        "B"
      ],
      "dist": {
        "A": 0,

        "C": 3,
        "D": 9,
        "E": 5

      "activeEdges": [
        "B-D"

  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

</body>
