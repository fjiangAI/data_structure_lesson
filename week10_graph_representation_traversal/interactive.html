<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Week 10 图的表示与遍历</title>
  <link rel="stylesheet" href="../assets/course-visualizer.css">
</head>
<body>
  <header class="week-hero">
    <nav class="week-nav">
      <a href="../onlineweb/">课程首页</a>
      <a href="lecture.md">讲义</a>
      <a href="examples/graph_traversal.c">C 代码</a>
      <a href="exercises.md">练习</a>
    </nav>
    <div class="week-hero-grid">
      <div>
        <p class="eyebrow">Week 10 交互演示</p>
        <h1>图的表示与遍历</h1>
        <p class="theme">理解多对多关系，掌握邻接矩阵、邻接表、DFS、BFS 和连通分量。</p>
        <div class="topics"><span>图</span><span>顶点</span><span>边</span><span>邻接矩阵</span><span>邻接表</span><span>DFS</span><span>BFS</span><span>连通性</span></div>
      </div>
      <aside class="principle-panel">
        <strong>本演示要验证的结构不变量</strong>
        <p>BFS 队列中保存已经发现但邻接点尚未全部处理的顶点。</p>
      </aside>
    </div>
  </header>
  <main class="learning-shell">
    <section class="demo-stage">
      <div class="stage-header">
        <div>
          <p class="eyebrow">Scenario</p>
          <h2>从顶点 A 开始执行 BFS，观察队列如何按层扩展。</h2>
        </div>
        <div class="stage-actions">
          <button id="prevStep" class="icon-btn" aria-label="上一步" title="上一步">←</button>
          <button id="playSteps" class="primary-btn">自动播放</button>
          <button id="nextStep" class="icon-btn" aria-label="下一步" title="下一步">→</button>
          <button id="resetSteps" class="ghost-btn">重置</button>
        </div>
      </div>
      <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="stage-grid">
        <div id="visualCanvas" class="visual-canvas"></div>
        <aside class="step-panel">
          <p id="stepCounter" class="step-counter"></p>
          <h3 id="stepTitle"></h3>
          <p id="stepText"></p>
          <div id="stepMeta" class="step-meta"></div>
        </aside>
      </div>
    </section>

    <section class="operation-section">
      <div>
        <p class="eyebrow">Operations</p>
        <h2>关键操作不是口号，而是状态变化</h2>
      </div>
      <div class="ops">
          <button class="op-card" data-name="添加边" data-action="矩阵赋值或链表头插" data-cost="O(1)">
            <strong>添加边</strong>
            <small>O(1)</small>
          </button>
          <button class="op-card" data-name="判断边存在" data-action="矩阵直接读，邻接表扫描" data-cost="O(1) 或 O(deg)">
            <strong>判断边存在</strong>
            <small>O(1) 或 O(deg)</small>
          </button>
          <button class="op-card" data-name="DFS" data-action="沿一条路径尽量深入" data-cost="O(V+E)">
            <strong>DFS</strong>
            <small>O(V+E)</small>
          </button>
          <button class="op-card" data-name="BFS" data-action="按距离层次扩展" data-cost="O(V+E)">
            <strong>BFS</strong>
            <small>O(V+E)</small>
          </button>
          <button class="op-card" data-name="连通分量" data-action="多次从未访问顶点启动遍历" data-cost="O(V+E)">
            <strong>连通分量</strong>
            <small>O(V+E)</small>
          </button>
      </div>
      <div id="operationExplain" class="operation-explain">点击一个操作，观察它对应的组织方式和复杂度。</div>
    </section>

    <section class="resource-strip">
      <a href="lecture.md">课程讲义</a>
      <a href="examples/graph_traversal.c">C 示例代码</a>
      <a href="exercises.md">练习题</a>
      <a href="answers.md">参考答案</a>
      <a href="extensions.md">拓展问题</a>
    </section>
  </main>
  <script>
    window.COURSE_DEMO = {

  "operations": [
    {
      "name": "添加边",

    },
    {
      "name": "判断边存在",
      "action": "矩阵直接读，邻接表扫描",
      "cost": "O(1) 或 O(deg)"
    },
    {
      "name": "DFS",
      "action": "沿一条路径尽量深入",
      "cost": "O(V+E)"
    },
    {
      "name": "BFS",

      "cost": "O(V+E)"
    },
    {

    }
  ],
  "kind": "graph",
  "scenario": "从顶点 A 开始执行 BFS，观察队列如何按层扩展。",
  "invariant": "BFS 队列中保存已经发现但邻接点尚未全部处理的顶点。",
  "steps": [

        "A"

      "title": "扩展 B",
      "activeNodes": [

      ],
      "visited": [

  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="../assets/course-visualizer.js"></script>
</body>
</html>
